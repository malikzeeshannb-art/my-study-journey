<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Building Project</title>
    <link rel="stylesheet" href="stylesheet/style.css">
    <link rel="stylesheet" href="stylesheet/global.css">
</head>
<body>
    <h1>Welcome to the Cards Building Project</h1>
    <div class="card-container">
        <div class="card">
            <img src="images/camera-800.jpg" alt="Camera Image" decoding="async" loading="lazy" draggable="true">
            <div class="card-content">
            <h2 class="card-heading">Card 1</h2>
            <p>This is the first card, this card have a image of preamiume camera. </p>
            <button>Click Me</button>
            </div>
        </div>
        <div class="card">
            <img src="images/headphones-img-800.jpg" alt="Headphones Image" decoding="async" loading="lazy" draggable="true">
            <div class="card-content">
            <h2 class="card-heading">Card 2</h2>
            <p>This is the second card, and this card have an image of a branded hedphone</p>
            <button>Click Me</button>
            </div>
        </div>
        <div class="card">
            <img src="images/smartwatch-800.jpg" alt="Smartwatch Image" decoding="async" loading="lazy" draggable="true">
            <div class="card-content">
            <h2 class="card-heading">Card 3</h2>
            <p>This is the third card, and this card have a image of smart fitness watch.</p>
            <button>Click Me</button>
            </div>
        </div>
    </div>
</body>
</html>
